<!DOCTYPE html>\n<html>\n<head>\n    <title>Pong Game</title>\n    <style>\n        canvas {\n            background: #000;\n            display: block;\n            margin: auto;\n        }\n    </style>\n</head>\n<body>\n    <canvas id="pong" width="800" height="400"></canvas>\n    <script>\n        const canvas = document.getElementById('pong');\n        const context = canvas.getContext('2d');\n\n        const paddleWidth = 10;\n        const paddleHeight = 100;\n        const ballSize = 10;\n        let playerPaddle = { x: 0, y: canvas.height / 2 - paddleHeight / 2, width: paddleWidth, height: paddleHeight };\n        let aiPaddle = { x: canvas.width - paddleWidth, y: canvas.height / 2 - paddleHeight / 2, width: paddleWidth, height: paddleHeight };\n        let ball = { x: canvas.width / 2, y: canvas.height / 2, size: ballSize, speed: { x: 5, y: 3 } };\n        let playerScore = 0;\n        let aiScore = 0;\n\n        function drawRect(x, y, width, height, color) {\n            context.fillStyle = color;\n            context.fillRect(x, y, width, height);\n        }\n\n        function drawScore() {\n            context.font = '20px Arial';\n            context.fillStyle = '#FFF';\n            context.fillText(playerScore, canvas.width / 4, 30);\n            context.fillText(aiScore, canvas.width * 3 / 4, 30);\n        }\n\n        function resetBall() {\n            ball.x = canvas.width / 2;\n            ball.y = canvas.height / 2;\n            ball.speed.x = -ball.speed.x;        \n        }\n\n        function update() {\n            // Update ball position\n            ball.x += ball.speed.x;\n            ball.y += ball.speed.y;\n\n            // Ball collision with paddles\n            if (ball.x <= playerPaddle.x + playerPaddle.width &&\n                ball.y >= playerPaddle.y &&\n                ball.y <= playerPaddle.y + playerPaddle.height) {\n                ball.speed.x = -ball.speed.x;\n            } else if (ball.x >= aiPaddle.x - ball.size &&\n                       ball.y >= aiPaddle.y &&\n                       ball.y <= aiPaddle.y + aiPaddle.height) {\n                ball.speed.x = -ball.speed.x;\n            }\n\n            // Ball collision with top and bottom\n            if (ball.y <= 0 || ball.y >= canvas.height - ball.size) {\n                ball.speed.y = -ball.speed.y;\n            }\n\n            // Check for score\n            if (ball.x < 0) {\n                aiScore++;\n                resetBall();\n            } else if (ball.x > canvas.width) {\n                playerScore++;\n                resetBall();\n            }\n\n            // AI paddle movement\n            aiPaddle.y += ((ball.y - (aiPaddle.y + aiPaddle.height / 2)) * 0.1);\n            aiPaddle.y = Math.max(aiPaddle.y, 0);\n            aiPaddle.y = Math.min(aiPaddle.y, canvas.height - aiPaddle.height);\n        }\n\n        function draw() {\n            // Clear the canvas\n            context.clearRect(0, 0, canvas.width, canvas.height);\n            // Draw paddles and ball\n            drawRect(playerPaddle.x, playerPaddle.y, playerPaddle.width, playerPaddle.height, '#FFF');\n            drawRect(aiPaddle.x, aiPaddle.y, aiPaddle.width, aiPaddle.height, '#FFF');\n            drawRect(ball.x, ball.y, ball.size, ball.size, '#FFF');\n            drawScore();\n        }\n\n        function gameLoop() {\n            update();\n            draw();\n            requestAnimationFrame(gameLoop);\n        }\n\n        window.addEventListener('mousemove', function(event) {\n            const rect = canvas.getBoundingClientRect();\n            playerPaddle.y = event.clientY - rect.top - playerPaddle.height / 2;\n            playerPaddle.y = Math.max(playerPaddle.y, 0);\n            playerPaddle.y = Math.min(playerPaddle.y, canvas.height - playerPaddle.height);\n        });\n\n        gameLoop();\n    </script>\n</body>\n</html>
